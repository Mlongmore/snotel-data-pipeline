name: SNOTEL Daily Fetch

on:
  schedule:
    # Runs at 12:00 UTC (6:00 AM Mountain Time) every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to manually click a button to run it anytime

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed so the bot can commit the parquet file back to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run data fetch script
      run: python fetch_weather_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add chalk_creek_weather.parquet
        # Only commit if the data actually changed today
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update of SNOTEL data" && git push)
